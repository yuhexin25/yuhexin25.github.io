    <text x="18" y="28" fill="#dce7f2" font-size="13" font-weight="700">DELAY TREND</text><text x="218" y="28" fill="#f59e0b" font-size="11">+12.4%</text>
    <g stroke="#29445e" stroke-width="1"><path d="M18 68h248M18 108h248M18 148h248M18 188h248"/></g>
    <path d="M20 175L55 158 88 166 121 119 154 132 187 86 220 97 264 54V190H20Z" fill="url(#chart-fill)"/>
    <path d="M20 175L55 158 88 166 121 119 154 132 187 86 220 97 264 54" fill="none" stroke="#f59e0b" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    <g fill="#ffe0a3"><circle cx="121" cy="119" r="4"/><circle cx="187" cy="86" r="4"/><circle cx="264" cy="54" r="4"/></g>
  </g>
