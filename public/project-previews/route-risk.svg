<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 600" role="img" aria-labelledby="title desc">
  <title id="title">Live Flight Delay Analysis dashboard preview</title>
  <desc id="desc">Dark live aviation dashboard with delay metrics, airport network map, risk indicators, and an orange delay trend chart.</desc>
  <defs>
    <linearGradient id="delay-bg" x1="0" x2="1" y1="0" y2="1"><stop offset="0" stop-color="#071321"/><stop offset="1" stop-color="#132b44"/></linearGradient>
    <linearGradient id="chart-fill" x1="0" x2="0" y1="0" y2="1"><stop offset="0" stop-color="#f59e0b" stop-opacity=".4"/><stop offset="1" stop-color="#f59e0b" stop-opacity="0"/></linearGradient>
    <filter id="delay-glow" x="-80%" y="-80%" width="260%" height="260%"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="960" height="600" rx="28" fill="url(#delay-bg)"/>
  <g font-family="Arial, sans-serif">
    <text x="42" y="55" fill="#f8fafc" font-size="22" font-weight="700">LIVE FLIGHT DELAY ANALYSIS</text>
    <text x="42" y="80" fill="#8fa8c1" font-size="12" letter-spacing="1.3">AIRPORT AND ROUTE RISK MONITOR</text>
    <g transform="translate(810 30)"><rect width="104" height="34" rx="17" fill="#3b2510" stroke="#f59e0b"/><circle cx="20" cy="17" r="5" fill="#f59e0b" filter="url(#delay-glow)"/><text x="34" y="22" fill="#ffd88a" font-size="12" font-weight="700">LIVE</text></g>
  </g>
  <g transform="translate(42 105)" font-family="Arial, sans-serif">
    <g><rect width="190" height="92" rx="15" fill="#10243a" stroke="#2c4660"/><text x="18" y="25" fill="#8fa8c1" font-size="11">AVG DELAY</text><text x="18" y="65" fill="#f8fafc" font-size="31" font-weight="700">34.8</text><text x="100" y="64" fill="#f59e0b" font-size="12">MIN</text></g>
    <g transform="translate(205)"><rect width="190" height="92" rx="15" fill="#10243a" stroke="#2c4660"/><text x="18" y="25" fill="#8fa8c1" font-size="11">FLIGHTS</text><text x="18" y="65" fill="#f8fafc" font-size="31" font-weight="700">1,284</text><text x="121" y="64" fill="#6eb4ec" font-size="12">TODAY</text></g>
    <g transform="translate(410)"><rect width="190" height="92" rx="15" fill="#10243a" stroke="#2c4660"/><text x="18" y="25" fill="#8fa8c1" font-size="11">AT RISK</text><text x="18" y="65" fill="#f59e0b" font-size="31" font-weight="700">86</text><text x="70" y="64" fill="#f3b0a2" font-size="12">ROUTES</text></g>
  </g>
  <g transform="translate(42 217)">
    <rect width="570" height="323" rx="18" fill="#0b1b2d" stroke="#2c4660"/>
    <text x="20" y="30" fill="#dce7f2" font-family="Arial, sans-serif" font-size="13" font-weight="700">NETWORK CONDITIONS</text>
    <path d="M70 105L111 80 166 87 207 76 247 89 291 77 325 93 369 92 405 104 448 97 482 116 518 124 537 149 527 175 494 178 472 203 451 230 423 240 401 218 365 214 342 231 307 218 270 226 236 210 199 210 171 190 138 181 116 157 84 149Z" fill="#152c44" stroke="#526e89" stroke-width="1.5"/>
