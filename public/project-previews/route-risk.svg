    <g fill="#8ac4f4" stroke="#e2f2ff" stroke-width="1"><circle cx="120" cy="169" r="5"/><circle cx="250" cy="184" r="5"/><circle cx="401" cy="138" r="6"/><circle cx="493" cy="147" r="5"/><circle cx="444" cy="205" r="5"/></g>
    <g fill="#f59e0b" stroke="#fff3d1" stroke-width="2" filter="url(#delay-glow)"><circle cx="145" cy="197" r="7"/><circle cx="327" cy="207" r="8"/><circle cx="401" cy="138" r="8"/></g>
    <g font-family="Arial, sans-serif" font-size="10" font-weight="700" fill="#e8f2fc"><text x="309" y="229">DFW</text><text x="383" y="122">ORD</text><text x="426" y="226">ATL</text></g>
    <g transform="translate(20 266)" font-family="Arial, sans-serif"><circle cx="5" cy="5" r="4" fill="#f59e0b"/><text x="16" y="9" fill="#93a9be" font-size="10">High risk</text><circle cx="92" cy="5" r="4" fill="#4b8fca"/><text x="103" y="9" fill="#93a9be" font-size="10">Monitoring</text></g>
  </g>
