    <g transform="translate(18 91)"><text fill="#f8fafc" font-size="12" font-weight="700">ATL</text><rect x="46" y="-8" width="180" height="10" rx="5" fill="#203a53"/><rect x="46" y="-8" width="96" height="10" rx="5" fill="#4b8fca"/><text x="235" fill="#9fc9ed" font-size="10">MED</text></g>
    <g transform="translate(18 134)"><text fill="#f8fafc" font-size="12" font-weight="700">DEN</text><rect x="46" y="-8" width="180" height="10" rx="5" fill="#203a53"/><rect x="46" y="-8" width="56" height="10" rx="5" fill="#5f8f7b"/><text x="235" fill="#a7d5c2" font-size="10">LOW</text></g>
