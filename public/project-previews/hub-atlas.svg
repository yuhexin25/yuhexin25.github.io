<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 600" role="img" aria-labelledby="title desc">
  <title id="title">U.S. Airline Hub Atlas map preview</title>
  <desc id="desc">Dark U.S. map with airline route arcs, highlighted major hubs, focus cities, and smaller airports.</desc>
  <defs>
    <linearGradient id="hub-bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#071321"/><stop offset=".62" stop-color="#0d2035"/><stop offset="1" stop-color="#182f48"/>
    </linearGradient>
    <radialGradient id="hub-light" cx=".55" cy=".48" r=".62">
      <stop offset="0" stop-color="#315476" stop-opacity=".38"/><stop offset="1" stop-color="#0b1a2b" stop-opacity="0"/>
    </radialGradient>
    <filter id="hub-glow" x="-80%" y="-80%" width="260%" height="260%"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="960" height="600" rx="28" fill="url(#hub-bg)"/>
  <rect width="960" height="600" rx="28" fill="url(#hub-light)"/>
  <g opacity=".16" stroke="#8fa8c1" stroke-width="1">
